# Logrotate configuration for UI service logs
# This configuration rotates logs daily, compresses old logs, and archives them

/var/log/application/ui/*.log {
    daily                          # Rotate logs daily
    rotate 7                       # Keep 7 rotated logs (7 days worth)
    compress                       # Compress rotated logs with gzip
    delaycompress                  # Delay compression until next rotation cycle
    missingok                      # Don't error if log file is missing
    notifempty                     # Don't rotate empty log files
    create 0640 root root          # Create new log file with these permissions
    maxage 30                      # Delete logs older than 30 days
    olddir /logs/Archive           # Move rotated logs to archive directory
    dateext                        # Use date extension for rotated files
    dateformat -%Y%m%d             # Date format: -20260324
    postrotate
        # Optional: Send signal to Java process to reopen log files
        # This is helpful if the application keeps file handles open
        kill -HUP `cat /var/run/application-ui.pid 2>/dev/null` 2>/dev/null || true
    endscript
}

